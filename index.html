<!DOCTYPE html>
<html lang="zh-Hant">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ea580c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="生活辦事英文">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>生活辦事英文</title>

<style>
:root{
  --sky:#ea580c; --sky2:#fb923c; --sky3:#fed7aa; --deep:#c2410c;
  --bg:#fff7ed; --card:#ffffff; --ink:#0f172a; --sub:#64748b; --line:#e2e8f0;
  --good:#10b981; --bad:#ef4444; --gold:#f59e0b; --sos:#e11d48; --shadow:0 6px 22px rgba(0,0,0,.12);
  --r:18px; --fs:1;
}
html[data-theme=dark]{
  --bg:#0b1220; --card:#131c2e; --ink:#e8eefc; --sub:#94a3b8; --line:#233047;
  --sky:#fb923c; --deep:#fed7aa; --shadow:0 6px 22px rgba(0,0,0,.4);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--bg); color:var(--ink);
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
  overscroll-behavior-y:contain; font-size:calc(16px * var(--fs));
}
body.big{--fs:1.22}
h1,h2,h3,p{margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}

.topbar{position:sticky;top:0;z-index:40;background:linear-gradient(135deg,var(--sky),var(--sky2));
  color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 0 12px;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.topbar .row,.topbar .stats{max-width:640px;width:100%;margin-left:auto;margin-right:auto;padding-left:14px;padding-right:14px;box-sizing:border-box}
.topbar .row{display:flex;align-items:center;gap:10px}
.topbar h1{font-size:1.2rem;font-weight:800;letter-spacing:.5px;flex:1}
.chip{background:rgba(255,255,255,.22);border-radius:999px;padding:5px 11px;font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:5px}
.iconbtn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:18px;flex:none}
.stats{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.stats .chip{background:rgba(255,255,255,.16)}

.wrap{max-width:640px;margin:0 auto;padding:14px}
.section-title{font-size:.88rem;font-weight:800;color:var(--sub);margin:18px 4px 10px;letter-spacing:.5px}

.banner{background:linear-gradient(135deg,#fff7ed,#ffedd5);border-radius:var(--r);padding:15px 16px;
  display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);margin-bottom:8px;border:1px solid #fde3c4}
html[data-theme=dark] .banner{background:linear-gradient(135deg,#3a2a12,#2a1f10);border-color:#4a3618}
.banner .big{font-size:30px}
.banner .t{flex:1}
.banner .t b{font-size:1rem}
.banner .t small{color:var(--sub);font-size:.78rem}
.banner .go{background:var(--gold);color:#fff;font-weight:800;padding:9px 15px;border-radius:12px;font-size:.88rem;white-space:nowrap}
.banner.rev{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#bfdbfe}
html[data-theme=dark] .banner.rev{background:linear-gradient(135deg,#122036,#0f1a2e);border-color:#1e3a5f}
.banner.rev .go{background:var(--sky)}
.banner.sos{background:linear-gradient(135deg,#fff1f2,#ffe4e6);border-color:#fecdd3}
html[data-theme=dark] .banner.sos{background:linear-gradient(135deg,#3a1220,#2a0f18);border-color:#5a1a2a}
.banner.sos .go{background:var(--sos)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.scard{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;text-align:left;transition:transform .1s}
.scard:active{transform:scale(.97)}
.scard .ico{font-size:30px;line-height:1}
.scard .nm{font-weight:800;font-size:.95rem;margin-top:8px}
.scard .en{font-size:.68rem;color:var(--sub);margin-top:1px}
.scard .desc{font-size:.72rem;color:var(--sub);margin-top:6px;line-height:1.35;min-height:31px}
.pbar{height:6px;border-radius:99px;background:var(--line);margin-top:10px;overflow:hidden}
.pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--sky),var(--sky2));border-radius:99px;transition:width .4s}
.scard .pct{position:absolute;top:12px;right:12px;font-size:.68rem;font-weight:800;color:var(--sky)}
.scard .done-badge{position:absolute;top:10px;right:10px;font-size:18px}

.back{display:flex;align-items:center;gap:6px;font-weight:700;color:var(--sky);font-size:.95rem;padding:4px 0}
.detail-head{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin:8px 0 4px;text-align:center}
.detail-head .ico{font-size:44px}
.detail-head h2{font-size:1.25rem;font-weight:800;margin-top:4px}
.detail-head .en{color:var(--sub);font-size:.82rem}
.modes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.mode{background:var(--card);border-radius:14px;padding:11px 4px;box-shadow:var(--shadow);text-align:center;transition:transform .1s}
.mode:active{transform:scale(.95)}
.mode .mi{font-size:21px}
.mode .ml{font-size:.68rem;font-weight:700;margin-top:4px;line-height:1.2}

.pitem{background:var(--card);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);margin-bottom:9px;display:flex;gap:11px;align-items:flex-start}
.pitem.sos-item{border-left:4px solid var(--sos)}
.pitem .body{flex:1;min-width:0}
.pitem .en{font-weight:700;font-size:.97rem;line-height:1.35}
.pitem .zh{color:var(--sub);font-size:.85rem;margin-top:3px}
.pitem .homo{color:var(--sos);font-size:.8rem;margin-top:2px;font-weight:600}
.pitem .tip{color:var(--sky);font-size:.75rem;margin-top:4px;background:rgba(14,165,233,.08);padding:3px 8px;border-radius:8px;display:inline-block}
.pitem .metarow{display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap}
.lv{font-size:.62rem;font-weight:800;padding:2px 6px;border-radius:6px;color:#fff}
.lv1{background:#22c55e}.lv2{background:#f59e0b}.lv3{background:#ef4444}
.stars{font-size:.68rem;letter-spacing:1px;color:var(--gold)}
.pitem .acts{display:flex;flex-direction:column;gap:8px}
.rbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;background:var(--bg);border:1px solid var(--line)}
.rbtn.fav.on{color:var(--gold);background:rgba(245,158,11,.12);border-color:transparent}
.shadowline{font-size:1.35rem;font-weight:800;line-height:1.55;margin:10px 0;text-align:center}
.wok{color:var(--good)}
.wmiss{color:var(--bad);text-decoration:underline;text-decoration-style:wavy;text-underline-offset:3px}
.misschip{background:rgba(239,68,68,.1);color:var(--bad);border:1px solid var(--bad);border-radius:9px;padding:3px 9px;margin:3px 3px 0;font-size:.8rem;font-weight:700;display:inline-block}
.fbnote{font-size:.72rem;opacity:.68;margin-top:7px;line-height:1.4}
.keyok{color:var(--good);font-weight:700}
.primcta{display:flex;gap:10px;margin:12px 0 4px}
.primbtn{flex:1;background:linear-gradient(135deg,var(--sky),var(--sky2));color:#fff;font-weight:800;font-size:1.05rem;padding:15px 10px;border-radius:16px;box-shadow:var(--shadow)}
.primbtn.ghost2{background:var(--card);color:var(--sky);border:1.5px solid var(--sky)}
.modehint{font-size:.76rem;color:var(--sub);margin:10px 4px 4px;line-height:1.4}
.bigshow{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;gap:18px}
.bigshow .ben{font-size:2.1rem;font-weight:800;line-height:1.35}
.bigshow .bzh{font-size:1.15rem;color:var(--sub)}
.bigshow .bhomo{font-size:1.05rem;color:var(--sos);font-weight:700}
.bigshow .tello{font-size:.8rem;color:var(--sub);background:rgba(14,165,233,.1);padding:6px 12px;border-radius:10px}
.banner.trip{background:linear-gradient(135deg,#eef2ff,#e0e7ff);border-color:#c7d2fe}
html[data-theme=dark] .banner.trip{background:linear-gradient(135deg,#1a1f3a,#141830);border-color:#2a3160}
.banner.trip .go{background:#6366f1}
.wzq{font-weight:800;font-size:.98rem;margin:16px 4px 8px}.wzq small{font-weight:400;color:var(--sub);font-size:.8rem}
.wzin{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:1rem;font-family:inherit}
.wzchips{display:flex;flex-wrap:wrap;gap:8px}
.wzchip{padding:10px 13px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:.9rem;font-weight:700}
.wzchip.on{background:var(--sky);color:#fff;border-color:transparent}
.cheatsc{font-weight:800;font-size:.9rem;color:var(--sky);margin:16px 4px 8px;border-bottom:2px solid var(--line);padding-bottom:5px}
.cheatrow{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow)}
.cheatrow .cen{font-weight:700;font-size:.98rem;line-height:1.35}
.cheatrow .czh{color:var(--sub);font-size:.82rem;margin-top:2px}
.primbtn.kid{background:linear-gradient(135deg,#f472b6,#fb923c)}
.kggrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.kgopt{background:var(--card);border-radius:18px;padding:18px 8px;box-shadow:var(--shadow);border:2px solid transparent;transition:transform .1s}
.kgopt:active{transform:scale(.95)}
.kgico{font-size:52px;line-height:1}
.kgzh{font-size:.9rem;font-weight:700;margin-top:8px;color:var(--sub)}
.kgopt.kgok{border-color:var(--good);background:rgba(16,185,129,.12)}
.kgopt.kgbad{border-color:var(--bad);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.stickerbook{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:10px;margin-top:6px}
.stik{background:var(--card);border-radius:14px;box-shadow:var(--shadow);aspect-ratio:1;display:grid;place-items:center;font-size:34px}
.lostcard{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:24px;gap:16px}
.lostcard .lem{font-size:56px}
.lostcard .len{font-size:1.7rem;font-weight:800;line-height:1.4}
.lostcard .lzh{font-size:1.05rem;color:var(--sub)}
.lostcard .lphone{font-size:1.5rem;font-weight:800;color:var(--sos);letter-spacing:1px}

.tagbar{display:flex;gap:7px;overflow-x:auto;padding:4px 2px 10px;-webkit-overflow-scrolling:touch}
.tagbar::-webkit-scrollbar{display:none}
.tg{white-space:nowrap;font-size:.82rem;font-weight:700;padding:6px 13px;border-radius:99px;background:var(--card);border:1px solid var(--line);color:var(--sub)}
.tg.on{background:var(--sky);color:#fff;border-color:transparent}

.nav{position:fixed;left:0;right:0;bottom:0;z-index:45;background:var(--card);border-top:1px solid var(--line);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 16px rgba(0,0,0,.05)}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.68rem;color:var(--sub);padding:5px 0;font-weight:700}
.nav button .ni{font-size:20px}
.nav button.on{color:var(--sky)}
.nav button.sosnav.on{color:var(--sos)}

.overlay{position:fixed;inset:0;z-index:60;background:var(--bg);display:flex;flex-direction:column;animation:slideup .25s}
@keyframes slideup{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.ovhead{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 12px) 16px 10px}
.ovhead .x{font-size:24px;width:34px}
.ovprog{flex:1;height:8px;border-radius:99px;background:var(--line);overflow:hidden}
.ovprog>i{display:block;height:100%;background:linear-gradient(90deg,var(--sky),var(--sky2));width:0;transition:width .3s}
.ovhead .cnt{font-weight:800;font-size:.85rem;color:var(--sub)}
.ovbody{flex:1;overflow-y:auto;padding:10px 18px 20px;display:flex;flex-direction:column}
.ovfoot{padding:12px 18px calc(16px + env(safe-area-inset-bottom));display:flex;gap:10px}
.overlay>.ovhead,.overlay>.ovbody,.overlay>.ovfoot{max-width:680px;width:100%;margin-left:auto;margin-right:auto;box-sizing:border-box}
.pbtn{flex:1;padding:15px;border-radius:15px;font-weight:800;font-size:1rem;background:var(--sky);color:#fff;box-shadow:var(--shadow)}
.pbtn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.pbtn.good{background:var(--good)}.pbtn.bad{background:var(--bad)}
.pbtn:disabled{opacity:.4}

.flash{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:14px}
.flash .card3d{background:var(--card);border-radius:24px;box-shadow:var(--shadow);padding:32px 24px;width:100%;min-height:220px;display:flex;flex-direction:column;justify-content:center;gap:14px}
.flash .big-en{font-size:1.6rem;font-weight:800;line-height:1.35}
.flash .big-zh{font-size:1.2rem;color:var(--sub)}
.flash .homo2{font-size:1rem;color:var(--sos);font-weight:700}
.flash .tip2{font-size:.85rem;color:var(--sky);background:rgba(14,165,233,.08);padding:7px 12px;border-radius:10px}
.flash .wico{font-size:56px}
.speak{background:linear-gradient(135deg,var(--sky),var(--sky2));color:#fff;border-radius:99px;padding:12px 22px;font-weight:800;font-size:.95rem;display:inline-flex;gap:8px;align-items:center;box-shadow:var(--shadow)}
.tapkuce{color:var(--sub);font-size:.82rem}

.qword{font-size:1.5rem;font-weight:800;text-align:center;margin:12px 0 4px;line-height:1.4}
.qsub{text-align:center;color:var(--sub);margin-bottom:16px;font-size:.88rem}
.opt{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px;font-size:1rem;font-weight:600;text-align:left;transition:.15s;width:100%}
.opt:active{transform:scale(.98)}
.opt.ok{border-color:var(--good);background:rgba(16,185,129,.1);color:var(--good);font-weight:800}
.opt.no{border-color:var(--bad);background:rgba(239,68,68,.1);color:var(--bad)}

.teach{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-top:6px;border-left:4px solid var(--sky);animation:pop .2s}
.teach .r{margin:5px 0;font-size:.95rem}
.teach .r.wrong{color:var(--bad)}.teach .r.right{color:var(--good);font-weight:800}
.teach .tipbox{background:rgba(14,165,233,.08);color:var(--sky);border-radius:10px;padding:9px 12px;margin-top:8px;font-size:.85rem}

.scz-target{min-height:60px;background:var(--card);border:2px dashed var(--line);border-radius:14px;padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;margin-bottom:6px}
.scz-target.err{border-color:var(--bad);animation:shake .35s}
.scz-target.ok{border-color:var(--good)}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.scz-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
.tok{background:var(--sky);color:#fff;border-radius:11px;padding:9px 14px;font-size:1rem;font-weight:700;box-shadow:var(--shadow)}
.tok.inpool{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:none}

.mic-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center}
.mic{width:92px;height:92px;border-radius:50%;background:linear-gradient(135deg,var(--sky),var(--sky2));color:#fff;font-size:38px;display:grid;place-items:center;box-shadow:0 10px 30px rgba(14,165,233,.4);transition:transform .15s}
.mic.rec{animation:pulse 1s infinite;background:linear-gradient(135deg,var(--bad),#f87171)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.heard{font-size:.9rem;color:var(--sub);min-height:22px}
.scorebig{font-size:3.1rem;font-weight:900}
.w-good{color:var(--good)}.w-mid{color:var(--gold)}.w-bad{color:var(--bad)}

.chat{flex:1;display:flex;flex-direction:column;gap:10px;padding:6px 0}
.bubble{max-width:82%;padding:11px 14px;border-radius:16px;font-size:.97rem;line-height:1.4;box-shadow:var(--shadow);animation:pop .2s}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
.bubble .z{font-size:.78rem;opacity:.75;margin-top:3px}
.bubble.npc{background:var(--card);align-self:flex-start;border-bottom-left-radius:5px}
.bubble.you{background:linear-gradient(135deg,var(--sky),var(--sky2));color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.roleask{text-align:center;color:var(--sub);font-size:.82rem;margin:6px 0}

.patcard{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:22px;text-align:center}
.patcard .frame{font-size:1.4rem;font-weight:800;line-height:1.5;margin-bottom:6px}
.patcard .slot{color:var(--sky);border-bottom:2px dashed var(--sky)}
.slotbtns{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:14px}
.slotbtn{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 15px;font-weight:700;font-size:.95rem}
.slotbtn.on{background:var(--sky);color:#fff;border-color:transparent}

.toast{position:fixed;left:50%;top:22%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:14px;font-weight:800;z-index:100;box-shadow:var(--shadow);animation:pop .2s;max-width:86vw;text-align:center}
.pop-heart{position:fixed;font-size:30px;z-index:120;pointer-events:none;animation:floatUp 1s ease-out forwards}
@keyframes floatUp{to{transform:translateY(-90px) scale(1.6);opacity:0}}

.searchbox{width:100%;padding:13px 16px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:1rem;box-shadow:var(--shadow)}
.searchbox:focus{outline:2px solid var(--sky)}

.prof{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
.pill{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:11px 16px;font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:8px}
.pill.on{border-color:var(--sky);color:var(--sky);background:rgba(14,165,233,.08)}
.bandsel{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:8px 0}
.bandopt{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:12px;text-align:left;box-shadow:var(--shadow)}
.bandopt.on{border-color:var(--sky);background:rgba(14,165,233,.06)}
.bandopt b{font-size:.95rem}.bandopt small{display:block;color:var(--sub);font-size:.72rem;margin-top:3px;line-height:1.3}
.setrow{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.setrow .lab b{font-size:.95rem}.setrow .lab small{color:var(--sub);font-size:.78rem;display:block;margin-top:2px}
.switch{width:52px;height:30px;border-radius:99px;background:var(--line);position:relative;transition:.2s;flex:none}
.switch.on{background:var(--sky)}
.switch>i{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s}
.switch.on>i{left:25px}
.stepper{display:flex;align-items:center;gap:12px}
.stepper button{width:34px;height:34px;border-radius:10px;background:var(--bg);border:1px solid var(--line);font-size:20px;font-weight:800}
.emptybox{text-align:center;color:var(--sub);padding:40px 20px;font-size:.88rem}
.emptybox .e{font-size:40px}

.badges{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:8px 0}
.badge{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 4px;text-align:center;opacity:.35;filter:grayscale(1)}
.badge.got{opacity:1;filter:none}
.badge .bi{font-size:26px}
.badge .bn{font-size:.62rem;font-weight:700;margin-top:4px;color:var(--sub)}

.refcard{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:11px}
.refcard h3{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px}

o send this package to Taiwan.", "zh": "我想要把這個包裹寄到台灣。", "tag": "寄包裹", "level": 1, "survival": true, "homophone": "愛的 賴克 兔 森的 帝斯 派幾之 兔 台灣"}, {"en": "I'd like to mail this letter, please.", "zh": "我想要寄這封信。", "tag": "寄信", "level": 1, "survival": false, "homophone": "愛的 賴克 兔 妹爾 帝斯 累特兒 普利斯"}, {"en": "How much does it cost to send this?", "zh": "寄這個要多少錢？", "tag": "詢問費用", "level": 1, "survival": true, "homophone": "好 罵取 得斯 一特 卡斯特 兔 森的 帝斯"}, {"en": "I need to send this by registered mail.", "zh": "我需要用掛號寄這個。", "tag": "掛號", "level": 2, "survival": true, "tip": "registered mail 掛號可追蹤、需簽收，比普通郵件貴但較安全。", "homophone": "愛 尼的 兔 森的 帝斯 拜 瑞舉斯特兒得 妹爾"}, {"en": "How long will it take to arrive?", "zh": "大概多久會到？", "tag": "詢問時間", "level": 2, "survival": false, "homophone": "好 龍 我 一特 貼克 兔 阿萊夫"}, {"en": "Can I get a tracking number for this?", "zh": "可以給我這個的追蹤編號嗎？", "tag": "要追蹤號", "level": 2, "survival": true, "homophone": "肯愛 給特 阿 除瑞金 難伯 佛 帝斯"}, {"en": "I'm here to pick up a package.", "zh": "我是來領取包裹的。", "tag": "領件", "level": 1, "survival": true, "homophone": "愛姆 希爾 兔 匹克阿普 阿 派幾之"}, {"en": "Here's the pickup notice / slip.", "zh": "這是領件通知單。", "tag": "領件單", "level": 2, "survival": true, "homophone": "希爾斯 則 匹克阿普 弄提斯／私利普"}, {"en": "Do you need my ID for this?", "zh": "需要看我的證件嗎？", "tag": "出示證件", "level": 2, "survival": false, "homophone": "賭 尤 尼的 麥 愛低 佛 帝斯"}, {"en": "I think this package was returned to sender. Can you tell me why?", "zh": "我這個包裹好像被退回了，可以告訴我原因嗎？", "tag": "詢問退件", "level": 3, "survival": false}, {"en": "Do I need to fill out a customs form?", "zh": "我需要填海關申報單嗎？", "tag": "海關單", "level": 2, "survival": false, "tip": "寄國際包裹常需填 customs declaration form，內容物與價值要誠實填寫。", "homophone": ""}, {"en": "Is this fragile? Do I need extra padding?", "zh": "這個易碎嗎？需要額外的緩衝包材嗎？", "tag": "易碎品", "level": 3, "survival": false}, {"en": "Which is faster, airmail or surface mail?", "zh": "空運跟海運哪個比較快？", "tag": "比較運送方式", "level": 3, "survival": false}, {"en": "Do you sell boxes and tape here?", "zh": "這裡有賣紙箱和膠 ️"}, {"en": "receptionist", "zh": "櫃檯人員", "ico": "🧑‍💼"}, {"en": "pharmacy", "zh": "藥局", "ico": "🏥"}, {"en": "allergy", "zh": "過敏", "ico": "🤧"}], "patterns": [{"en": "I have a ___.", "zh": "我有___(症狀)。", "slots": ["fever", "sore throat", "headache", "stomachache"]}, {"en": "Can I make an appointment for ___?", "zh": "我可以預約___的看診嗎？", "slots": ["today", "tomorrow morning", "this afternoon"]}, {"en": "I'm allergic to ___.", "zh": "我對___過敏。", "slots": ["penicillin", "aspirin", "peanuts"]}], "phrases": [{"en": "Excuse me, I'd like to make an appointment.", "zh": "不好意思，我想要預約看診。", "tag": "開場", "level": 1, "survival": true, "homophone": "依克斯Q密 愛的 賴克 兔 妹克 恩 阿破因特門特"}, {"en": "I don't feel well.", "zh": "我不太舒服。", "tag": "開場", "level": 1, "survival": true, "homophone": "愛 動特 費爾 威爾"}, {"en": "Do you have an opening today?", "zh": "今天還有空檔嗎？", "tag": "預約", "level": 2, "survival": false, "homophone": "賭 尤 黑夫 恩 歐匹寧 特爹"}, {"en": "Is this your first time here?", "zh": "這是您第一次來嗎？(醫護常問)", "tag": "預約", "level": 2, "survival": false, "homophone": "意斯 帝斯 幽兒 福斯特 太姆 希爾"}, {"en": "Here's my insurance card.", "zh": "這是我的健保卡。", "tag": "櫃檯", "level": 1, "survival": true, "homophone": "希爾斯 麥 印秀潤斯 卡的"}, {"en": "I have a fever and a sore throat.", "zh": "我發燒又喉嚨痛。", "tag": "症狀", "level": 1, "survival": true, "homophone": "愛 黑夫 阿 飛佛 恩 阿 索兒 史若特"}, {"en": "I've had a headache since yesterday.", "zh": "我從昨天開始頭痛。", "tag": "症狀", "level": 2, "survival": false, "homophone": "愛福 黑的 阿 黑得誒克 辛斯 耶斯特得"}, {"en": "It hurts here.", "zh": "這裡痛。", "tag": "症狀", "level": 1, "survival": true, "homophone": "一特 哈茲 希爾", "tip": "看診時可直接手指痛點配合這句"}, {"en": "I feel dizzy and nauseous.", "zh": "我覺得頭暈想吐。", "tag": "症狀", "level": 2, "survival": false, "homophone": "愛 費爾 底日 恩 諾休斯"}, {"en": "How long have you had these symptoms?", "zh": "這些症狀多久了？(醫生常問)", "tag": "問診", "level": 2, "survival": false, "homophone": "好 龍 黑夫 尤 黑的 低斯 新普透姆斯"}, {"en": "Do you have any allergies?", "zh": "你有任何過敏嗎？(醫生常問)", "tag": "問診", "level": 2, "survival": false, "homophone": "賭 尤 黑夫 安尼 阿樂吉斯"}, {"en": "I'm allergic to penicillin.", "zh": "我對盤尼西林過敏。", "tag": "過敏", "level": 2, "survival": true, "tip": "務必主動告知，避免用藥風險", "homophone": "愛姆 阿樂吉客 兔 噴你西林"}, {"en": "Take one pill three times a day after meals.", "zh": "每天三次，飯後服用一顆。(醫生交代)", "tag": "用藥", "level": 3, "survival": false}, {"en": "Where can I pick up my prescription?", "zh": "我要去哪裡拿藥？", "tag": "領藥", "level": 1, "survival": true, "homophone": "灰兒 肯 愛 匹克阿普 麥 普利斯Q力訓"}, {"en": "How much do I need to pay?", "zh": "我要付多少錢？", "tag": "付款", "level": 1, "survival": false, "homophone": "好 罵取 賭 愛 尼的 兔 配"}, {"en": "Thank you, doctor. Have a good day.", "zh": "謝謝醫生，祝您有美好的一天。", "tag": "收尾", "level": 1, "survival": false, "homophone": "山Q 達克特兒 黑夫 阿 古的 爹"}], "dialogue": {"title": "診所掛號與看診", "youRole": "病人", "npcRole": "櫃檯／醫生", "lines": [{"who": "you", "en": "Excuse me, I'd like to make an appointment. I don't feel well.", "zh": "不好意思，我想要預約看診，我不太舒服。"}, {"who": "npc", "en": "Sure. Is this your first time here? May I have your insurance card, please?", "zh": "好的。這是您第一次來嗎？可以給我您的健保卡嗎？"}, {"who": "you", "en": "Yes, first time. Here's my insurance card.", "zh": "是的，第一次。這是我的健保卡。"}, {"who": "npc", "en": "Great, please have a seat. The doctor will call you shortly.", "zh": "好的，請先坐著等候，醫生很快會叫您。"}, {"who": "npc", "en": "So, what brings you in today?", "zh": "今天是哪裡不舒服呢？"}, {"who": "you", "en": "I have a fever and a sore throat since yesterday.", "zh": "我從昨天開始發燒又喉嚨痛。"}, {"who": "npc", "en": "I see. Do you have any allergies?", "zh": "了解。你有任何過敏嗎？"}, {"who": "you", "en": "Yes, I'm allergic to penicillin.", "zh": "有，我對盤尼西林過敏。"}, {"who": "npc", "en": "Noted. It looks like a mild throat infection. I'll write you a prescription.", "zh": "我記下了。看起來是輕微的喉嚨發炎，我會開處方箋給您。"}, {"who": "you", "en": "Where can I pick up my prescription?", "zh": "我要去哪裡拿藥？"}, {"who": "npc", "en": "The pharmacy is right next door. Take the medicine three times a day after meals.", "zh": "藥局就在隔壁。藥請每天三次、飯後服用。"}, {"who": "you", "en": "Thank you, doctor. Have a good day.", "zh": "謝謝醫生，祝您有美好的一天。"}]}}, {"id": "pharmacy", "icon": "💊", "title": "藥局買藥", "titleEn": "Pharmacy", "desc": "買成藥、領處方藥、問用法用量", "country": "US", "words": [{"en": "pharmacy", "zh": "藥局", "ico": "💊"}, {"en": "prescription", "zh": "處方箋", "ico": "📄"}, {"en": "over-the-counter (OTC)", "zh": "成藥／非處方藥", "ico": "🧴"}, {"en": "pharmacist", "zh": "藥師", "ico": "🥼"}, {"en": "dosage", "zh": "劑量", "ico": "⚖️"}, {"en": "side effect", "zh": "副作用", "ico": "⚠️"}, {"en": "painkiller", "zh": "止痛藥", "ico": "🩹"}, {"en": "allergic", "zh": "過敏的", "ico": "🤧"}], "patterns": [{"en": "Do you have something for ___?", "zh": "你們有治療___的藥嗎？", "slots": ["a headache", "a cough", "an upset stomach"]}, {"en": "How many times a day should I take ___?", "zh": "___一天要吃幾次？", "slots": ["this", "these pills", "this medicine"]}, {"en": "I'm allergic to ___.", "zh": "我對___過敏。", "slots": ["penicillin", "aspirin", "sulfa drugs"]}], "phrases": [{"en": "Excuse me, do you have something for a headache?", "zh": "不好意思，你們有治頭痛的藥嗎？", "tag": "開場需求", "level": 1, "survival": true, "homophone": "依克斯Q密 賭 尤 黑夫 山姆施硬 佛 阿 黑得誒克"}, {"en": "I'd like to fill this prescription, please.", "zh": "我要領這張處方箋的藥。", "tag": "領處方藥", "level": 1, "survival": true, "homophone": "愛的 賴克 兔 費爾 帝斯 普利斯Q力訓 普利斯"}, {"en": "How much is this?", "zh": "這個多少錢？", "tag": "問價錢", "level": 1, "survival": false, "homophone": "好 罵取 意斯 帝斯"}, {"en": "Can I pay with my insurance card?", "zh": "我可以用健保卡付費嗎？", "tag": "健保", "level": 2, "survival": false, "homophone": "肯愛 配 位斯 麥 印秀潤斯 卡的"}, {"en": "How many times a day should I take this?", "zh": "這個一天要吃幾次？", "tag": "用法用量", "level": 1, "survival": true, "homophone": "好 沒你 太姆斯 阿 爹 秀的 愛 貼克 帝斯"}, {"en": "Should I take it before or after meals?", "zh": "要飯前還是飯後吃？", "tag": "用法用量", "level": 2, "survival": true, "homophone": "秀的 愛 貼克 一特 逼佛 歐兒 阿夫特 密爾斯"}, {"en": "How many pills should I take at a time?", "zh": "一次要吃幾顆？", "tag": "劑量", "level": 2, "survival": false, "homophone": "好 沒你 批爾斯 秀的 愛 貼克 誒特 阿 太姆"}, {"en": "Are there any side effects I should know about?", "zh": "有什麼我該注意的副作用嗎？", "tag": "副作用", "level": 2, "survival": false, "tip": "藥師常會主動提醒，你也可以主動問", "homophone": "阿 賽兒 安尼 賽得一費克特斯 愛 秀的 諾 阿保特"}, {"en": "I'm allergic to penicillin.", "zh": "我對盤尼西林過敏。", "tag": "過敏告知", "level": 1, "survival": true, "homophone": "愛姆 阿樂吉客 兔 噴你西林", "tip": "看醫生或領藥時務必主動告知過敏史"}, {"en": "Is this safe to take with other medications?", "zh": "這個跟其他藥一起吃安全嗎？", "tag": "藥物交互", "level": 3, "survival": false}, {"en": "Can you recommend something for a sore throat?", "zh": "可以推薦治喉嚨痛的藥嗎？", "tag": "推薦用藥", "level": 2, "survival": false, "homophone": "肯尤 瑞卡曼得 山姆施硬 佛 阿 索兒 史若特"}, {"en": "Do you have this in a lower dose?", "zh": "有比較低劑量的嗎？", "tag": "劑量", "level": 3, "survival": false}, {"en": "Is a doctor's note required for this medicine?", "zh": "這個藥需要醫生的證明嗎？", "tag": "處方規定", "level": 3, "survival": false}, {"en": "Where can I find the cough syrup?", "zh": "咳嗽糖漿放在哪裡？", "tag": "找商品", "level": 2, "survival": false, "homophone": "灰兒 肯 愛 煩得 則 咖夫 蘇入普"}, {"en": "Can I get a refill on this prescription?", "zh": "這個處方箋可以續領嗎？", "tag": "續領", "level": 2, "survival": false, "homophone": "肯愛 給特 阿 瑞費爾 忘 帝斯 普利斯Q力訓"}, {"en": "Thank you, that's all I need.", "zh": "謝謝，我需要的就這些。", "tag": "收尾道謝", "level": 1, "survival": true, "homophone": "山Q 賽茲 歐 愛 尼的"}], "dialogue": {"title": "在美式藥局買藥", "youRole": "顧客", "npcRole": "藥師", "lines": [{"who": "you", "en": "Excuse me, do you have something for a bad cough?", "zh": "不好意思，你們有治嚴重咳嗽的藥嗎？"}, {"who": "npc", "en": "Sure, is it a dry cough or a wet cough?", "zh": "當然，是乾咳還是有痰的咳嗽？"}, {"who": "you", "en": "It's a dry cough, and my throat is sore too.", "zh": "是乾咳，喉嚨也會痛。"}, {"who": "npc", "en": "This cough syrup should help with both. Are you allergic to any medications?", "zh": "這款咳嗽糖漿對兩者都有幫助。你對任何藥物過敏嗎？"}, {"who": "you", "en": "I'm allergic to penicillin, but that's it.", "zh": "我對盤尼西林過敏，其他就沒有了。"}, {"who": "npc", "en": "Good to know. This one doesn't contain that, so you're fine.", "zh": "了解，這款不含那個成分，可以放心使用。"}, {"who": "you", "en": "How many times a day should I take it?", "zh": "這個一天要吃幾次？"}, {"who": "npc", "en": "Take one tablespoon every six hours, up to four times a day.", "zh": "每六小時吃一湯匙，一天最多四次。"}, {"who": "you", "en": "Should I take it before or after meals?", "zh": "要飯前還是飯後吃？"}, {"who": "npc", "en": "After meals is better, to avoid an upset stomach.", "zh": "飯後吃比較好，避免胃不舒服。"}, {"who": "you", "en": "Got it. How much is this?", "zh": "了解。這個多少錢？"}, {"who": "npc", "en": "That'll be twelve dollars. Feel better soon!", "zh": "一共十二美元。祝你早日康復！"}]}}, {"id": "phone-plan", "icon": "📱", "title": "辦手機門號", "titleEn": "Phone & SIM", "desc": "辦SIM卡、選網路方案、儲值、問資費", "country": "US", "words": [{"en": "SIM card", "zh": "SIM卡", "ico": "📶"}, {"en": "plan", "zh": "資費方案", "ico": "📱"}, {"en": "data", "zh": "網路流量", "ico": "📊"}, {"en": "top up", "zh": "儲值", "ico": "💰"}, {"en": "monthly fee", "zh": "月租費", "ico": "💵"}, {"en": "contract", "zh": "合約", "ico": "📄"}, {"en": "prepaid", "zh": "預付卡", "ico": "🎫"}, {"en": "carrier", "zh": "電信商", "ico": "📡"}], "patterns": [{"en": "I'd like to ___.", "zh": "我想要___。", "slots": ["get a new SIM card", "sign up for a prepaid plan", "top up my phone"]}, {"en": "How much ___ does this plan come with?", "zh": "這個方案有多少___？", "slots": ["data", "talk time", "text messages"]}, {"en": "Is there a ___?", "zh": "有___嗎？", "slots": ["contract", "monthly fee", "activation fee"]}], "phrases": [{"en": "Hi, I'd like to get a new SIM card, please.", "zh": "嗨，我想辦一張新的SIM卡。", "tag": "開場", "level": 1, "survival": true, "homophone": "嗨 愛的 賴克 兔 給特 阿 紐 心 卡的 普利斯", "tip": "開場最常用的一句，店員一聽就知道你要辦門號"}, {"en": "What plans do you have?", "zh": "你們有什麼方案？", "tag": "問方案", "level": 1, "survival": true, "homophone": "華特 普藍斯 賭 尤 黑夫"}, {"en": "Is this prepaid or a monthly plan?", "zh": "這是預付卡還是月租型方案？", "tag": "預付月租", "level": 2, "survival": false, "homophone": "意斯 帝斯 普利配得 歐兒 阿 曼斯利 普藍"}, {"en": "How much is the monthly fee?", "zh": "月租費多少錢？", "tag": "問資費", "level": 1, "survival": true, "homophone": "好 罵取 意斯 則 曼斯利 費"}, {"en": "How much data do I get?", "zh": "有多少網路流量？", "tag": "問流量", "level": 1, "survival": true, "homophone": "好 罵取 得踏 賭 愛 給特"}, {"en": "Is the data speed fast?", "zh": "網速快嗎？", "tag": "問網速", "level": 2, "survival": false, "homophone": "意斯 則 得踏 斯批得 費斯特"}, {"en": "Can I top up here?", "zh": "我可以在這裡儲值嗎？", "tag": "儲值", "level": 1, "survival": false, "homophone": "肯愛 拓阿普 希爾"}, {"en": "I'd like to top up 20 dollars.", "zh": "我想儲值20美元。", "tag": "儲值金額", "level": 2, "survival": false, "tip": "美國可換成 twenty dollars，台灣可說 six hundred NT dollars", "homophone": "愛的 賴克 兔 拓阿普 團提 大樂斯"}, {"en": "Do I need to sign a contract?", "zh": "我需要簽合約嗎？", "tag": "問合約", "level": 2, "survival": true, "homophone": "賭愛 尼的 兔 賽恩 阿 康崔特"}, {"en": "I want a no-contract plan.", "zh": "我要不綁約的方案。", "tag": "無合約", "level": 2, "survival": false, "homophone": "愛 忘特 阿 諾康崔特 普藍"}, {"en": "Can you switch my SIM card for me?", "zh": "可以幫我換SIM卡嗎？", "tag": "換卡", "level": 3, "survival": false}, {"en": "Can I keep my phone number?", "zh": "我可以保留原本的門號嗎？", "tag": "攜碼", "level": 3, "survival": false, "tip": "換電信商保留舊號碼叫 number porting"}, {"en": "Does this plan include international roaming?", "zh": "這個方案有包含國際漫遊嗎？", "tag": "國際漫遊", "level": 3, "survival": false}, {"en": "Where can I check my bill?", "zh": "我可以在哪裡查帳單？", "tag": "查帳單", "level": 2, "survival": false, "homophone": "灰兒 肯 愛 切克 麥 逼爾"}, {"en": "Can I pay by credit card?", "zh": "可以用信用卡付款嗎？", "tag": "付款方式", "level": 2, "survival": false, "homophone": "肯愛 配 拜 苦瑞低 卡的"}, {"en": "Thank you, that's all I need.", "zh": "謝謝，這樣就可以了。", "tag": "收尾", "level": 1, "survival": true, "homophone": "山Q 賽茲 歐 愛 尼的"}], "dialogue": {"title": "在電信門市辦手機門號", "youRole": "顧客", "npcRole": "門市店員", "lines": [{"who": "you", "en": "Hi, I'd like to get a new SIM card, please.", "zh": "嗨，我想辦一張新的SIM卡。"}, {"who": "npc", "en": "Sure! Is this for a prepaid or a monthly plan?", "zh": "沒問題！你要辦預付卡還是月租型方案呢？"}, {"who": "you", "en": "What plans do you have?", "zh": "你們有什麼方案？"}, {"who": "npc", "en": "We have a $30 plan with 5GB of data, and a $50 plan with unlimited data.", "zh": "我們有30美元含5GB流量的方案，還有50美元的無限流量方案。"}, {"who": "you", "en": "How much data do I get with the $30 plan?", "zh": "30美元的方案有多少流量？"}, {"who": "npc", "en": "You get 5GB of high-speed data, then it slows down after that.", "zh": "有5GB高速流量，用完之後網速會變慢。"}, {"who": "you", "en": "Do I need to sign a contract?", "zh": "我需要簽合約嗎？"}, {"who": "npc", "en": "No, this plan is contract-free. You can cancel anytime.", "zh": "不用，這個方案不綁約，隨時都可以取消。"}, {"who": "you", "en": "Great, I'll take the $30 plan. Can I top up online later?", "zh": "太好了，我要30美元的方案。之後可以線上儲值嗎？"}, {"who": "npc", "en": "Yes, you can top up anytime through our app or website.", "zh": "可以，你可以隨時透過我們的App或網站儲值。"}, {"who": "you", "en": "Perfect. Can I pay by credit card?", "zh": "太好了。可以用信用卡付款嗎？"}, {"who": "npc", "en": "Of course. Here's your new SIM card — welcome aboard!", "zh": "當然可以。這是你的新SIM卡，歡迎加入！"}]}}, {"id": "utilities", "icon": "💡", "title": "水電網路帳單", "titleEn": "Utilities & Bills", "desc": "開通、繳費、帳單問題、報修", "country": "US", "words": [{"en": "electricity bill", "zh": "電費帳單", "ico": "💡"}, {"en": "water bill", "zh": "水費帳單", "ico": "🚰"}, {"en": "internet service", "zh": "網路服務", "ico": "📶"}, {"en": "set up / activate", "zh": "開通", "ico": "🔌"}, {"en": "due date", "zh": "繳費期限", "ico": "📅"}, {"en": "overcharge", "zh": "多收費", "ico": "💸"}, {"en": "outage", "zh": "斷電/斷網", "ico": "⚠️"}, {"en": "technician", "zh": "維修人員", "ico": "🛠️"}], "patterns": [{"en": "I'd like to set up ___ service at my new address.", "zh": "我想在我的新地址開通___服務。", "slots": ["electricity", "water", "internet"]}, {"en": "There's a problem with my ___ this month.", "zh": "我這個月的___有問題。", "slots": ["electricity bill", "water bill", "internet bill"]}, {"en": "My ___ has been out since ___.", "zh": "我的___從___開始就沒了。", "slots": ["internet / this morning", "power / last night", "hot water / yesterday"]}], "phrases": [{"en": "Excuse me, I'd like to set up electricity service.", "zh": "不好意思，我想開通電力服務。", "tag": "開場", "level": 1, "survival": true, "homophone": "依克斯Q密 愛的 賴克 兔 塞特阿普 伊勒克垂西替 社維斯"}, {"en": "I just moved in and need to activate my internet.", "zh": "我剛搬進來，需要開通網路。", "tag": "開通", "level": 1, "survival": true, "homophone": "愛 賈斯特 木夫得 引 恩的 尼的 兔 阿克提維特 麥 印特內特"}, {"en": "How do I pay my water bill?", "zh": "我要怎麼繳水費?", "tag": "繳費", "level": 1, "survival": true, "homophone": "好 賭 愛 配 麥 挖特 逼爾"}, {"en": "Can I pay this bill online or at a convenience store?", "zh": "這張帳單可以線上繳或去超商繳嗎?", "tag": "繳費方式", "level": 2, "survival": false, "tip": "台灣常見在7-11、全家等便利商店繳費", "homophone": "肯愛 配 帝斯 逼爾 昂賴恩 歐兒 誒特 阿 康維寧斯 私多兒"}, {"en": "When is the due date for this bill?", "zh": "這張帳單的繳費期限是什麼時候?", "tag": "期限", "level": 1, "survival": true, "homophone": "溫 意斯 則 丟爹特 佛 帝斯 逼爾"}, {"en": "I think there's a mistake on my bill this month.", "zh": "我覺得我這個月的帳單有錯誤。", "tag": "帳單問題", "level": 2, "survival": false, "homophone": "愛 施因克 賽兒斯 阿 密斯貼克 忘 麥 逼爾 帝斯 曼斯"}, {"en": "I was overcharged for last month's usage.", "zh": "上個月的用量我被多收費了。", "tag": "多收費", "level": 3, "survival": false}, {"en": "Can you explain why this charge is so high?", "zh": "你能解釋一下為什麼這筆費用這麼高嗎?", "tag": "詢問明細", "level": 2, "survival": false, "homophone": "肯尤 一克斯普連 壞 帝斯 恰之 意斯 蘇 嗨"}, {"en": "My internet has been down since this morning.", "zh": "我的網路從今天早上就斷了。", "tag": "報修", "level": 1, "survival": true, "homophone": "麥 印特內特 哈斯 賓 道恩 辛斯 帝斯 摸寧"}, {"en": "There's no hot water in my apartment.", "zh": "我家公寓沒有熱水。", "tag": "報修", "level": 2, "survival": false, "homophone": "賽兒斯 諾 哈特 挖特 引 麥 阿趴特門特"}, {"en": "Can you send a technician to check it?", "zh": "可以派維修人員來看看嗎?", "tag": "請求維修", "level": 2, "survival": true, "tip": "打客服電話報修常用句", "homophone": "肯尤 森的 阿 特尼訓 兔 切克 一特"}, {"en": "When can the technician come to my place?", "zh": "維修人員什麼時候可以到我家?", "tag": "約時間", "level": 2, "survival": false, "homophone": "溫 肯 則 特尼訓 康 兔 麥 普累斯"}, {"en": "Is there a service fee for the repair?", "zh": "維修需要收費嗎?", "tag": "費用確認", "level": 2, "survival": false, "homophone": "意斯 賽兒 阿 社維斯 費 佛 則 瑞配兒"}, {"en": "Do I need to bring my ID and lease to set up service?", "zh": "開通服務需要帶身分證和租約嗎?", "tag": "開通文件", "level": 3, "survival": false}, {"en": "Can I switch to autopay so I don't miss the due date?", "zh": "我可以改成自動扣款，這樣才不會錯過繳費期限嗎?", "tag": "自動扣款", "level": 3, "survival": false}, {"en": "Thank you for your help, I'll pay it right away.", "zh": "謝謝你的幫忙，我馬上繳。", "tag": "收尾", "level": 1, "survival": false, "homophone": "山Q 佛 幽兒 黑爾普 愛我 配 一特 瑞特 阿為"}], "dialogue": {"title": "報修網路與確認帳單", "youRole": "住戶", "npcRole": "客服人員", "lines": [{"who": "you", "en": "Hi, I'm calling because my internet has been down since this morning.", "zh": "嗨，我打來是因為我的網路從今天早上就斷了。"}, {"who": "npc", "en": "I'm sorry to hear that. Can I have your account number, please?", "zh": "很抱歉聽到這個消息。可以給我您的帳號嗎?"}, {"who": "you", "en": "Sure, it's 4487215.", "zh": "好的，是4487215。"}, {"who": "npc", "en": "Thanks. Let me check... It looks like there's an outage in your area.", "zh": "謝謝。我查一下... 看起來您那一區有斷線的情況。"}, {"who": "you", "en": "Oh, that explains it. Do you know when it will be fixed?", "zh": "喔，難怪。你知道大概什麼時候會修好嗎?"}, {"who": "npc", "en": "A technician is already on the way. It should be resolved within two hours.", "zh": "維修人員已經在路上了，應該兩小時內就能解決。"}, {"who": "you", "en": "Great, thank you. Also, I think there's a mistake on my last bill.", "zh": "太好了，謝謝。另外，我覺得上個月的帳單有錯誤。"}, {"who": "npc", "en": "Let me take a look. What seems to be the problem?", "zh": "我看一下。是什麼問題呢?"}, {"who": "you", "en": "I was overcharged — the amount is almost double last month's.", "zh": "我被多收費了，金額幾乎是上個月的兩倍。"}, {"who": "npc", "en": "I see the issue. I'll adjust it and send you a corrected bill by email.", "zh": "我看到問題了。我會幫您調整，並用電子郵件寄送更正後的帳單。"}, {"who": "you", "en": "Perfect, thank you so much for your help.", "zh": "太好了，非常謝謝你的幫忙。"}, {"who": "npc", "en": "You're welcome. Have a great day!", "zh": "不客氣，祝您有美好的一天!"}]}}, {"id": "gov-office", "icon": "🏛️", "title": "公家機關", "titleEn": "Government Office", "desc": "辦證件、填表格、問窗口、預約", "country": "US", "words": [{"en": "form", "zh": "表格", "ico": "📝"}, {"en": "ID / passport", "zh": "身分證／護照", "ico": "🪪"}, {"en": "appointment", "zh": "預約", "ico": "📅"}, {"en": "counter / window", "zh": "櫃檯／窗口", "ico": "🪟"}, {"en": "number ticket", "zh": "號碼牌", "ico": "🎫"}, {"en": "application", "zh": "申請", "ico": "📋"}, {"en": "fee", "zh": "規費", "ico": "💵"}, {"en": "stamp / seal", "zh": "印章／蓋章", "ico": "🔖"}], "patterns": [{"en": "I'd like to ___.", "zh": "我想要___。", "slots": ["apply for a new passport", "renew my ID card", "make an appointment"]}, {"en": "Where can I get ___?", "zh": "我可以在哪裡拿到___？", "slots": ["a number ticket", "this form", "more information"]}, {"en": "Do I need ___ for this?", "zh": "辦這個需要___嗎？", "slots": ["an appointment", "a photocopy of my ID", "a passport photo"]}], "phrases": [{"en": "Excuse me, where do I take a number?", "zh": "不好意思，請問要去哪裡抽號碼牌？", "tag": "開場問路", "level": 1, "survival": true, "homophone": "依克斯Q密 灰兒 賭 愛 貼克 阿 難伯"}, {"en": "I'd like to apply for a new passport.", "zh": "我想申請新護照。", "tag": "說明需求", "level": 1, "survival": true, "homophone": "愛的 賴克 兔 阿普賴 佛 阿 紐 帕斯波特"}, {"en": "Do I need an appointment?", "zh": "我需要先預約嗎？", "tag": "問預約", "level": 1, "survival": true, "homophone": "賭愛 尼的 恩 阿破因特門特"}, {"en": "I have an appointment at 10 o'clock.", "zh": "我十點有預約。", "tag": "報到", "level": 1, "survival": false, "homophone": "愛 黑夫 恩 阿破因特門特 誒特 貼恩 歐克拉克"}, {"en": "Which window should I go to?", "zh": "我應該去哪個窗口？", "tag": "問窗口", "level": 1, "survival": true, "homophone": "位取 溫斗 秀愛 溝 兔"}, {"en": "Could you help me fill out this form?", "zh": "可以幫我填這張表格嗎？", "tag": "請求協助", "level": 2, "survival": true, "homophone": "苦揪 黑爾普 密 費爾 凹特 帝斯 佛姆"}, {"en": "What documents do I need to bring?", "zh": "我需要帶什麼文件？", "tag": "問文件", "level": 2, "survival": false, "tip": "先問清楚再排隊，可省下重跑一趟", "homophone": "華特 達Q悶特斯 賭 愛 尼的 兔 布林"}, {"en": "Here is my ID and application form.", "zh": "這是我的身分證和申請表。", "tag": "遞交文件", "level": 1, "survival": false, "homophone": "希爾 意斯 麥 愛低 恩的 阿普利肯訓 佛姆"}, {"en": "How long will it take to process?", "zh": "辦理需要多久時間？", "tag": "問時間", "level": 2, "survival": false, "homophone": "好 龍 我 一特 貼克 兔 普拉塞斯"}, {"en": "How much is the fee?", "zh": "規費多少錢？", "tag": "問費用", "level": 1, "survival": true, "homophone": "好 罵取 意斯 則 費"}, {"en": "Can I pay by credit card?", "zh": "可以刷卡付款嗎？", "tag": "付款方式", "level": 2, "survival": false, "homophone": "肯愛 配 拜 苦瑞低 卡的"}, {"en": "I made a mistake on the form. Can I get a new one?", "zh": "我表格填錯了，可以再拿一張嗎？", "tag": "更正表格", "level": 2, "survival": false, "homophone": "愛 妹得 阿 密斯貼克 忘 則 佛姆 肯愛 給特 阿 紐 萬"}, {"en": "Where do I sign?", "zh": "我要簽在哪裡？", "tag": "簽名", "level": 1, "survival": false, "homophone": "灰兒 賭 愛 賽恩"}, {"en": "When can I pick it up?", "zh": "我什麼時候可以來領？", "tag": "問取件", "level": 2, "survival": false, "homophone": "溫 肯 愛 匹克 一特 阿普"}, {"en": "Will I get a text message or email notification?", "zh": "會有簡訊或email通知嗎？", "tag": "問通知", "level": 3, "survival": false}, {"en": "Thank you very much for your help.", "zh": "非常感謝您的協助。", "tag": "道謝結尾", "level": 1, "survival": false, "homophone": "山克尤 非瑞 罵取 佛 幽兒 黑爾普"}], "dialogue": {"title": "在公家機關辦理護照申請", "youRole": "民眾 (You)", "npcRole": "櫃檯人員 (Clerk)", "lines": [{"who": "you", "en": "Excuse me, where do I take a number for passport applications?", "zh": "不好意思，請問申請護照要在哪裡抽號碼牌？"}, {"who": "npc", "en": "Right over there, by the entrance. Take a 'B' ticket for passport services.", "zh": "就在那邊，入口旁。護照業務請抽B類號碼牌。"}, {"who": "you", "en": "Thank you. Do I need an appointment for this?", "zh": "謝謝。這個需要先預約嗎？"}, {"who": "npc", "en": "No, walk-ins are fine, but the wait might be about 30 minutes.", "zh": "不用，現場排隊就可以，但可能要等大約30分鐘。"}, {"who": "you", "en": "That's okay. Could you tell me what documents I need to bring?", "zh": "沒關係。可以告訴我需要帶什麼文件嗎？"}, {"who": "npc", "en": "You'll need your ID card, one passport photo, and this application form.", "zh": "你需要身分證、一張護照照片，還有這張申請表。"}, {"who": "you", "en": "I see. Could you help me fill out this form? I'm not sure about a few sections.", "zh": "了解。可以幫我填這張表格嗎？有幾個部分我不太確定。"}, {"who": "npc", "en": "Sure, just fill in your name and address here, and sign at the bottom.", "zh": "當然，姓名和地址填在這裡，然後在最下面簽名。"}, {"who": "you", "en": "Got it. How much is the fee, and how long will processing take?", "zh": "了解。規費多少錢？辦理需要多久時間？"}, {"who": "npc", "en": "The fee is 1,300 NT dollars, and it usually takes about four working days.", "zh": "規費是新台幣1300元，通常需要大約四個工作天。"}, {"who": "you", "en": "Can I pay by credit card, and when can I pick it up?", "zh": "可以刷卡付款嗎？我什麼時候可以來領？"}, {"who": "npc", "en": "Yes, credit card is fine. You can pick it up after Thursday with this receipt.", "zh": "可以，刷卡沒問題。星期四之後就可以憑這張收據來領取。"}]}}, {"id": "repair", "icon": "🔧", "title": "維修報修", "titleEn": "Repairs", "desc": "家電水管壞掉、叫師傅、預約到府", "country": "US", "words": [{"en": "leak", "zh": "漏水", "ico": "💧"}, {"en": "repairman / technician", "zh": "維修師傅", "ico": "🧑‍🔧"}, {"en": "appliance", "zh": "家電", "ico": "🔌"}, {"en": "pipe", "zh": "水管", "ico": "🚰"}, {"en": "broken / not working", "zh": "壞掉／不能用", "ico": "❌"}, {"en": "estimate / quote", "zh": "估價", "ico": "💰"}, {"en": "appointment", "zh": "預約", "ico": "📅"}, {"en": "warranty", "zh": "保固", "ico": "📄"}], "patterns": [{"en": "My ___ is broken / leaking.", "zh": "我的___壞了／漏水了。", "slots": ["washing machine 洗衣機", "air conditioner 冷氣", "kitchen faucet 廚房水龍頭"]}, {"en": "Can you come check it ___?", "zh": "你可以___來看嗎？", "slots": ["today 今天", "tomorrow morning 明天早上", "this weekend 這個週末"]}, {"en": "How much will it cost to ___?", "zh": "___要多少錢？", "slots": ["fix the pipe 修水管", "replace the part 換零件", "repair the unit 維修這台機器"]}], "phrases": [{"en": "Hi, I need to report a repair problem.", "zh": "你好，我要報修一個問題。", "tag": "開場", "level": 1, "survival": true, "homophone": "嗨 愛 尼的 兔 瑞剖特 阿 瑞配兒 撲拉本"}, {"en": "My kitchen faucet is leaking.", "zh": "我的廚房水龍頭在漏水。", "tag": "漏水", "level": 1, "survival": true, "homophone": "麥 客親 發賽特 意斯 力肯"}, {"en": "The air conditioner isn't working.", "zh": "冷氣不能用了。", "tag": "故障", "level": 1, "survival": true, "homophone": "則 誒兒 肯滴訓兒 意任特 沃金"}, {"en": "Can you send someone over today?", "zh": "你們今天可以派人過來嗎？", "tag": "派人", "level": 1, "survival": true, "homophone": "肯尤 森的 桑萬 歐佛 特爹"}, {"en": "How much do you charge for a home visit?", "zh": "到府服務要收多少錢？", "tag": "到府費", "level": 2, "survival": false, "homophone": "好 罵取 賭 尤 恰之 佛 阿 后姆 非資特"}, {"en": "Is there an extra fee for coming after hours?", "zh": "下班時間叫修有加收費用嗎？", "tag": "加班費", "level": 2, "survival": false, "homophone": "意斯 賽兒 恩 誒克斯特拉 費 佛 康敏 阿夫特 阿兒斯"}, {"en": "Could you give me a rough estimate first?", "zh": "可以先給我大概的估價嗎？", "tag": "估價", "level": 2, "survival": true, "homophone": "苦揪 哥一夫 密 阿 拉夫 誒斯特妹特 福斯特", "tip": "修理前先問估價，避免被亂收費"}, {"en": "When is the earliest available appointment?", "zh": "最早什麼時候可以預約？", "tag": "預約時間", "level": 2, "survival": false, "homophone": "溫 意斯 則 兒力誒斯特 阿為拉伯 阿破因特門特"}, {"en": "I'm available anytime after 2 pm tomorrow.", "zh": "我明天下午兩點後都有空。", "tag": "我方時間", "level": 2, "survival": false, "homophone": "愛姆 阿為拉伯 安尼太姆 阿夫特 兔 屁誒姆 特媽羅"}, {"en": "Do I need to be home when the technician comes?", "zh": "師傅來的時候我需要在家嗎？", "tag": "是否在場", "level": 2, "survival": false, "homophone": "賭 愛 尼的 兔 逼 后姆 溫 則 特尼訓 康斯"}, {"en": "The washing machine makes a strange noise during the spin cycle.", "zh": "洗衣機在脫水的時候有奇怪的聲音。", "tag": "描述症狀", "level": 3, "survival": false}, {"en": "There's a water stain on the ceiling under the bathroom.", "zh": "浴室下方的天花板有水漬。", "tag": "漏水痕跡", "level": 3, "survival": false}, {"en": "Is this still under warranty?", "zh": "這個還在保固期內嗎？", "tag": "保固", "level": 2, "survival": true, "homophone": "意斯 帝斯 私提兒 安得兒 沃嵐提", "tip": "保固內通常免收工錢"}, {"en": "How long will the repair take?", "zh": "維修大概要多久？", "tag": "時間", "level": 1, "survival": false, "homophone": "好 龍 我 則 瑞配兒 貼克"}, {"en": "Please call me before you arrive.", "zh": "到之前請先打電話給我。", "tag": "到前通知", "level": 1, "survival": true, "homophone": "普利斯 摳兒 密 逼佛 尤 阿萊夫"}, {"en": "Thank you so much, everything works fine now.", "zh": "太謝謝了，現在都正常了。", "tag": "收尾致謝", "level": 1, "survival": false, "homophone": "山Q 蘇 罵取 誒複瑞幸 沃克斯 肥恩 鬧"}], "dialogue": {"title": "叫水電師傅來修水龍頭", "youRole": "你（屋主）", "npcRole": "維修師傅／客服", "lines": [{"who": "you", "en": "Hi, I need to report a repair problem. My kitchen faucet has been leaking since yesterday.", "zh": "你好，我要報修。我廚房的水龍頭從昨天開始一直在漏水。"}, {"who": "npc", "en": "I'm sorry to hear that. Can you tell me your address, please?", "zh": "很抱歉聽到這個。可以告訴我您的地址嗎？"}, {"who": "you", "en": "Sure, it's 25 Zhongshan Road, 3rd floor.", "zh": "好的，是中山路25號三樓。"}, {"who": "npc", "en": "Got it. Can you send someone over today, or would tomorrow morning work better?", "zh": "好的。您希望今天派人過去，還是明天早上比較方便？"}, {"who": "you", "en": "Tomorrow morning would be great. How much will it cost to fix the pipe?", "zh": "明天早上比較好。修水管大概要多少錢？"}, {"who": "npc", "en": "It depends on the problem, but the home visit fee is about NT$300, plus parts if needed.", "zh": "要看實際情況，但到府服務費大概三百元，如果需要換零件會再另外算。"}, {"who": "you", "en": "That sounds fair. When exactly will the technician arrive?", "zh": "聽起來合理。師傅大概什麼時候會到？"}, {"who": "npc", "en": "Between 9 and 11 am. He'll call you before he arrives.", "zh": "早上九點到十一點之間。他到之前會先打電話給您。"}, {"who": "you", "en": "Great, thank you. Do I need to be home the whole time?", "zh": "太好了，謝謝。我需要一直待在家嗎？"}, {"who": "npc", "en": "Just when he arrives to open the door, and to confirm the repair is done.", "zh": "只要他到的時候幫忙開門，還有確認修好之後就可以了。"}, {"who": "you", "en": "Understood. Thanks so much for your help.", "zh": "了解，非常謝謝你的幫忙。"}, {"who": "npc", "en": "You're welcome. See you tomorrow morning!", "zh": "不客氣，明天早上見！"}]}}, {"id": "appointment", "icon": "📅", "title": "電話預約", "titleEn": "Appointments", "desc": "打電話預約、改期、取消、確認", "country": "US", "words": [{"en": "appointment", "zh": "預約", "ico": "📅"}, {"en": "reschedule", "zh": "改期", "ico": "🔄"}, {"en": "cancel", "zh": "取消", "ico": "❌"}, {"en": "confirm", "zh": "確認", "ico": "✅"}, {"en": "available", "zh": "有空的", "ico": "🕐"}, {"en": "receptionist", "zh": "櫃檯人員", "ico": "💁"}, {"en": "schedule", "zh": "排定時間", "ico": "🗓️"}, {"en": "waiting list", "zh": "候補名單", "ico": "📋"}], "patterns": [{"en": "I'd like to make an appointment for ___.", "zh": "我想預約___。", "slots": ["a haircut", "a check-up", "next Monday", "2 p.m."]}, {"en": "Can I reschedule my appointment to ___?", "zh": "我可以把預約改到___嗎？", "slots": ["Friday afternoon", "next week", "a later time", "tomorrow morning"]}, {"en": "Is there any availability on ___?", "zh": "___有空檔嗎？", "slots": ["Thursday", "the 15th", "this weekend", "Monday morning"]}], "phrases": [{"en": "Hello, I'd like to make an appointment.", "zh": "你好，我想預約。", "tag": "開場", "level": 1, "survival": true, "homophone": "哈囉 愛的 賴克 兔 妹克 恩 阿破因特門特"}, {"en": "Do you have any openings this week?", "zh": "這星期有空檔嗎？", "tag": "詢問時間", "level": 1, "survival": true, "homophone": "賭 尤 黑夫 安尼 歐匹寧斯 帝斯 屋克"}, {"en": "What time works best for you?", "zh": "你這邊什麼時間比較方便？", "tag": "詢問時間", "level": 2, "survival": false, "homophone": "華特 太姆 沃克斯 貝斯特 佛 尤"}, {"en": "I'm calling to confirm my appointment.", "zh": "我打來確認我的預約。", "tag": "確認", "level": 1, "survival": true, "homophone": "愛姆 摳林 兔 康分 麥 阿破因特門特"}, {"en": "I need to reschedule my appointment.", "zh": "我需要改期我的預約。", "tag": "改期", "level": 1, "survival": true, "homophone": "愛 尼的 兔 瑞斯Q朱 麥 阿破因特門特", "tip": "reschedule 是關鍵字，說不出全句時單講這個字對方也懂。"}, {"en": "Can we move it to next Tuesday instead?", "zh": "可以改到下週二嗎？", "tag": "改期", "level": 2, "survival": false, "homophone": "肯 屋 木夫 一特 兔 內克斯特 兔斯得 因斯貼得"}, {"en": "I'm sorry, but I need to cancel my appointment.", "zh": "不好意思，我需要取消預約。", "tag": "取消", "level": 1, "survival": true, "homophone": "愛姆 蘇里 霸特 愛 尼的 兔 肯蘇 麥 阿破因特門特"}, {"en": "Something came up and I can't make it.", "zh": "臨時有事，我沒辦法去了。", "tag": "取消原因", "level": 2, "survival": false, "homophone": "山姆施硬 肯 阿普 恩的 愛 肯特 妹克 一特"}, {"en": "Could you put me on the waiting list?", "zh": "可以把我排進候補名單嗎？", "tag": "候補", "level": 3, "survival": false}, {"en": "What's your name and phone number, please?", "zh": "請問您的姓名和電話？", "tag": "對方詢問", "level": 1, "survival": false, "homophone": "華資 幽兒 內姆 恩的 分 難伯 普利斯"}, {"en": "Can you spell your last name for me?", "zh": "可以拼一下你的姓氏嗎？", "tag": "確認資料", "level": 2, "survival": false, "homophone": "肯尤 私被爾 幽兒 拉斯特 內姆 佛 密"}, {"en": "Is 3 p.m. on Friday okay for you?", "zh": "星期五下午三點可以嗎？", "tag": "對方提議", "level": 2, "survival": false, "homophone": "意斯 史瑞 屁誒姆 忘 夫來得 歐虧 佛 尤"}, {"en": "I'll text you a reminder the day before.", "zh": "我會在前一天傳簡訊提醒你。", "tag": "提醒", "level": 2, "survival": false, "homophone": "愛我 貼克斯特 尤 阿 瑞麥得兒 則 爹 逼佛"}, {"en": "Please arrive 10 minutes early.", "zh": "請提早十分鐘到。", "tag": "叮嚀", "level": 2, "survival": false, "homophone": "普利斯 阿萊夫 貼恩 咪妞斯 兒力"}, {"en": "Sorry, I'm running a few minutes late.", "zh": "不好意思，我會晚幾分鐘到。", "tag": "遲到告知", "level": 1, "survival": true, "homophone": "蘇里 愛姆 拉寧 阿 福 咪妞斯 淚特"}, {"en": "Thank you, see you then!", "zh": "謝謝，到時候見！", "tag": "收尾", "level": 1, "survival": false, "homophone": "山Q 西 尤 現"}], "dialogue": {"title": "打電話改預約時間", "youRole": "顧客", "npcRole": "診所櫃檯人員", "lines": [{"who": "npc", "en": "Good morning, Sunrise Clinic. How can I help you?", "zh": "早安，日出診所您好，請問需要什麼協助？"}, {"who": "you", "en": "Hi, I have an appointment tomorrow, but I need to reschedule it.", "zh": "你好，我明天有預約，但我需要改期。"}, {"who": "npc", "en": "Sure, may I have your name, please?", "zh": "好的，請問您的姓名？"}, {"who": "you", "en": "It's Wang, W-A-N-G.", "zh": "我姓王，W-A-N-G。"}, {"who": "npc", "en": "Got it. When would you like to come in instead?", "zh": "了解了，那您想改到什麼時候呢？"}, {"who": "you", "en": "Is there anything available this Friday afternoon?", "zh": "這星期五下午有空檔嗎？"}, {"who": "npc", "en": "Let me check... Yes, we have an opening at 3 p.m.", "zh": "我查一下……有的，下午三點有空。"}, {"who": "you", "en": "That works great for me. Please book that.", "zh": "這個時間對我很方便，麻煩幫我排這個。"}, {"who": "npc", "en": "All set. We'll send you a reminder the day before.", "zh": "都排好了，我們會在前一天傳提醒訊息給您。"}, {"who": "you", "en": "Perfect, thank you so much!", "zh": "太好了，非常謝謝！"}, {"who": "npc", "en": "You're welcome. See you Friday!", "zh": "不客氣，星期五見！"}]}}, {"id": "delivery", "icon": "📦", "title": "收退包裹", "titleEn": "Deliveries & Returns", "desc": "收件、退貨、換貨、聯絡客服", "country": "US", "words": [{"en": "package", "zh": "包裹", "ico": "📦"}, {"en": "tracking number", "zh": "追蹤號碼", "ico": "🔢"}, {"en": "return", "zh": "退貨", "ico": "↩️"}, {"en": "exchange", "zh": "換貨", "ico": "🔄"}, {"en": "refund", "zh": "退款", "ico": "💵"}, {"en": "receipt", "zh": "收據", "ico": "🧾"}, {"en": "customer service", "zh": "客服", "ico": "🎧"}, {"en": "signature", "zh": "簽收", "ico": "✍️"}], "patterns": [{"en": "I'd like to return ___.", "zh": "我想要退___。", "slots": ["this item", "this jacket", "this package"]}, {"en": "Can I exchange this for ___?", "zh": "我可以把這個換成___嗎？", "slots": ["a bigger size", "a different color", "a new one"]}, {"en": "I'm calling about ___.", "zh": "我打來是關於___。", "slots": ["a missing package", "a late delivery", "my refund"]}], "phrases": [{"en": "Excuse me, I think this is my package.", "zh": "不好意思，我想這是我的包裹。", "tag": "開場", "level": 1, "survival": true, "homophone": "依克斯Q密 愛 施因克 帝斯 意斯 麥 派幾之"}, {"en": "Can you leave it at the front door, please?", "zh": "可以麻煩放在大門口嗎？", "tag": "指定放置", "level": 1, "survival": true, "homophone": "肯尤 力夫 一特 誒特 則 夫潤特 斗兒 普利斯"}, {"en": "Do I need to sign for this?", "zh": "這需要我簽收嗎？", "tag": "簽收", "level": 1, "survival": false, "homophone": "賭 愛 尼的 兔 賽恩 佛 帝斯"}, {"en": "I'd like to return this, please.", "zh": "我想要退這個，麻煩了。", "tag": "退貨", "level": 1, "survival": true, "homophone": "愛的 賴克 兔 里透恩 帝斯 普利斯"}, {"en": "Do you have the receipt?", "zh": "你有收據嗎？", "tag": "詢問收據", "level": 2, "survival": false, "tip": "店員常先問這句，記得帶收據或出示電子憑證。", "homophone": "賭 尤 黑夫 則 里西特"}, {"en": "Here's my receipt / order confirmation email.", "zh": "這是我的收據／訂單確認信。", "tag": "出示證明", "level": 2, "survival": false, "homophone": "希爾斯 麥 里西特／歐得兒 康分妹訓 伊妹爾"}, {"en": "Can I exchange this for a bigger size?", "zh": "我可以換成大一號的嗎？", "tag": "換貨", "level": 2, "survival": true, "tip": "size 也可換成 color（顏色）或 a different style（不同款式）。", "homophone": "肯愛 一克斯勸居 帝斯 佛 阿 逼格兒 塞斯"}, {"en": "I'd like a refund instead of an exchange.", "zh": "我想要退款，不想換貨。", "tag": "要求退款", "level": 2, "survival": false, "homophone": "愛的 賴克 阿 瑞放得 因斯貼得 歐夫 恩 一克斯勸居"}, {"en": "How long will the refund take?", "zh": "退款要多久才會到？", "tag": "退款時程", "level": 2, "survival": false, "homophone": "好 龍 我 則 瑞放得 貼克"}, {"en": "This item arrived damaged.", "zh": "這個東西送到的時候是壞的。", "tag": "商品損壞", "level": 2, "survival": true, "homophone": "帝斯 愛疊姆 阿萊夫得 得咪之的"}, {"en": "My package hasn't arrived yet, and it's been a week.", "zh": "我的包裹還沒到，已經一個禮拜了。", "tag": "包裹未到", "level": 2, "survival": true, "homophone": "麥 派幾之 哈任特 阿萊夫得 耶特 恩的 一此 賓 阿 屋克"}, {"en": "Can you check the tracking number for me?", "zh": "可以幫我查一下追蹤號碼嗎？", "tag": "查詢物流", "level": 2, "survival": false, "homophone": "肯尤 切克 則 除瑞金 難伯 佛 密"}, {"en": "I'm calling about a missing package.", "zh": "我打來是要問一個沒收到的包裹。", "tag": "聯絡客服", "level": 2, "survival": false, "homophone": "愛姆 摳林 阿保特 阿 密性 派幾之"}, {"en": "Is there a restocking fee for returns?", "zh": "退貨的話有補貨手續費嗎？", "tag": "退貨規定", "level": 3, "survival": false}, {"en": "Can I get store credit instead of a refund?", "zh": "我可以換成商店點數而不是退現金嗎？", "tag": "換點數", "level": 3, "survival": false}, {"en": "Could you send someone to redeliver it tomorrow?", "zh": "可以請人明天再送一次嗎？", "tag": "重新配送", "level": 3, "survival": false}], "dialogue": {"title": "退貨換貨對話", "youRole": "顧客", "npcRole": "客服人員", "lines": [{"who": "you", "en": "Hi, I'd like to return this jacket, please.", "zh": "嗨，我想要退這件外套，麻煩了。"}, {"who": "npc", "en": "Sure, do you have the receipt or order number?", "zh": "好的，請問您有收據或訂單編號嗎？"}, {"who": "you", "en": "Yes, here's my order confirmation email.", "zh": "有的，這是我的訂單確認信。"}, {"who": "npc", "en": "Great. What's the reason for the return?", "zh": "太好了。請問退貨的原因是？"}, {"who": "you", "en": "It's the wrong size. Can I exchange it for a bigger one instead?", "zh": "尺寸不對。我可以換成大一號的嗎？"}, {"who": "npc", "en": "Of course. Let me check if we have that size in stock.", "zh": "當然可以。我先確認一下有沒有那個尺寸的庫存。"}, {"who": "npc", "en": "Yes, we do. I'll process the exchange for you now.", "zh": "有的，我現在幫您處理換貨。"}, {"who": "you", "en": "Great, thank you. How long will it take to receive the new one?", "zh": "太好了，謝謝。新的大概多久會到？"}, {"who": "npc", "en": "It should arrive within 3 to 5 business days.", "zh": "應該會在3到5個工作天內送達。"}, {"who": "you", "en": "Perfect, that works for me. Thanks for your help!", "zh": "太好了，這樣可以。謝謝你的幫忙！"}, {"who": "npc", "en": "You're welcome. Is there anything else I can help you with?", "zh": "不客氣。還有其他需要協助的嗎？"}, {"who": "you", "en": "No, that's all. Have a good day!", "zh": "沒有了，就這樣。祝你有美好的一天！"}]}}, {"id": "haircut", "icon": "💇", "title": "剪髮設計", "titleEn": "Haircut", "desc": "溝通髮型、長度、顏色、需求", "country": "US", "words": [{"en": "haircut", "zh": "剪髮", "ico": "💇"}, {"en": "trim", "zh": "修剪(小修)", "ico": "✂️"}, {"en": "layers", "zh": "打層次", "ico": "📐"}, {"en": "bangs", "zh": "瀏海", "ico": "👧"}, {"en": "length", "zh": "長度", "ico": "📏"}, {"en": "color/dye", "zh": "染髮", "ico": "🎨"}, {"en": "blow-dry", "zh": "吹整", "ico": "💨"}, {"en": "stylist", "zh": "設計師", "ico": "🧑‍🎨"}], "patterns": [{"en": "I want to ___.", "zh": "我想要___。", "slots": ["get a trim", "cut it shoulder-length", "add some layers", "dye it light brown"]}, {"en": "Can you make it ___?", "zh": "可以幫我弄___嗎？", "slots": ["shorter", "a little shorter", "not too short", "more natural-looking"]}, {"en": "Just ___, please.", "zh": "麻煩就___就好。", "slots": ["a trim", "an inch off", "the split ends", "a wash and blow-dry"]}], "phrases": [{"en": "I'd like a haircut, please.", "zh": "我想剪頭髮。", "tag": "開場", "level": 1, "survival": true, "homophone": "愛的 賴克 阿 嘿兒卡特 普利斯"}, {"en": "Just a trim, please.", "zh": "只要修剪一下就好。", "tag": "開場", "level": 1, "survival": true, "homophone": "賈斯特 阿 崔母 普利斯"}, {"en": "Not too short, please.", "zh": "不要剪太短。", "tag": "長度", "level": 1, "survival": true, "homophone": "納特 兔 秀特 普利斯"}, {"en": "About an inch off the length.", "zh": "長度剪掉大約一吋。", "tag": "長度", "level": 2, "survival": false, "homophone": "阿保特 恩 因取 歐夫 則 藍克斯"}, {"en": "Can you cut it to shoulder length?", "zh": "可以剪到及肩的長度嗎？", "tag": "長度", "level": 2, "survival": false, "homophone": "肯尤 卡特 一特 兔 秀爾得兒 藍克斯"}, {"en": "I want to keep the length but add some layers.", "zh": "長度不變，但想打一點層次。", "tag": "層次", "level": 3, "survival": false, "tip": "layers 指剪出高低層次感"}, {"en": "Can you trim my bangs a little?", "zh": "可以幫我修一下瀏海嗎？", "tag": "瀏海", "level": 2, "survival": false, "homophone": "肯尤 崔母 麥 邦斯 阿 力頭"}, {"en": "I don't want bangs, thanks.", "zh": "我不要剪瀏海，謝謝。", "tag": "瀏海", "level": 2, "survival": false, "homophone": "愛 動特 忘特 邦斯 山克斯"}, {"en": "Can I see a picture? I want it to look like this.", "zh": "我可以給你看照片嗎？我想剪成這樣。", "tag": "參考", "level": 2, "survival": true, "tip": "直接秀圖片最保險，避免溝通落差", "homophone": "肯愛 西 阿 匹克恰兒 愛 忘特 一特 兔 路克 賴克 帝斯"}, {"en": "I'm not sure, what do you suggest?", "zh": "我不太確定，你有什麼建議嗎？", "tag": "詢問建議", "level": 2, "survival": false, "homophone": "愛姆 納特 秀兒 華特 賭 尤 塞覺斯特"}, {"en": "I'd like to dye my hair a light brown color.", "zh": "我想把頭髮染成淺棕色。", "tag": "染髮", "level": 3, "survival": false}, {"en": "How much would it cost to get my hair colored?", "zh": "染髮大概要多少錢？", "tag": "詢價", "level": 2, "survival": true, "tip": "進門先問價格避免價格誤會", "homophone": "好 罵取 屋的 一特 卡斯特 兔 給特 麥 黑兒 卡樂得"}, {"en": "Just a wash and blow-dry, please.", "zh": "麻煩洗頭加吹整就好。", "tag": "服務", "level": 1, "survival": false, "homophone": "賈斯特 阿 挖許 恩 布洛拽 普利斯"}, {"en": "Please don't use a razor.", "zh": "請不要用剃刀。", "tag": "技法", "level": 3, "survival": false}, {"en": "That looks great, thank you!", "zh": "看起來很棒，謝謝你！", "tag": "收尾", "level": 1, "survival": true, "homophone": "賽特 路克斯 桂特 山Q"}, {"en": "How much do I owe you?", "zh": "總共多少錢？", "tag": "收尾", "level": 2, "survival": false, "homophone": "好 罵取 賭 愛 歐 尤"}], "dialogue": {"title": "在美髮沙龍剪髮", "youRole": "顧客", "npcRole": "設計師", "lines": [{"who": "npc", "en": "Hi there! What can I do for you today?", "zh": "嗨！今天想剪什麼樣的髮型呢？"}, {" nk you, I'll think it over and let you know.", "zh": "謝謝，我考慮一下再回覆你。", "tag": "收尾", "level": 1, "survival": false, "homophone": "山Q 愛我 施因克 一特 歐佛 恩的 勒特 尤 諾"}], "dialogue": {"title": "看房詢問租屋", "youRole": "看房房客", "npcRole": "房東", "lines": [{"who": "you", "en": "Hi, I'm here to see the apartment for rent.", "zh": "嗨，我是來看這間出租公寓的。"}, {"who": "npc", "en": "Sure, come on in. This is the living room, and the bedroom is right there.", "zh": "當然，請進。這是客廳，臥室就在那邊。"}, {"who": "you", "en": "It looks nice. How much is the rent per month?", "zh": "看起來不錯。每個月租金多少？"}, {"who": "npc", "en": "It's $1,200 a month, plus a $1,200 deposit.", "zh": "每個月1200美元，加上1200美元押金。"}, {"who": "you", "en": "Is the deposit refundable when I move out?", "zh": "搬走時押金會退還嗎？"}, {"who": "npc", "en": "Yes, as long as there's no damage to the unit.", "zh": "會的，只要房子沒有損壞就會退。"}, {"who": "you", "en": "Are utilities included in the rent?", "zh": "租金有包含水電瓦斯費嗎？"}, {"who": "npc", "en": "Water is included, but electricity and internet are separate.", "zh": "水費有含，但電費和網路要另外付。"}, {"who": "you", "en": "Got it. How long is the lease, and when can I move in?", "zh": "了解。租約是簽多久？什麼時候可以搬進來？"}, {"who": "npc", "en": "It's a one-year lease, and you can move in next week.", "zh": "簽一年租約，下週就可以搬進來。"}, {"who": "you", "en": "Sounds good. I'd like to sign the lease today.", "zh": "聽起來不錯，我今天想簽這份租約。"}, {"who": "npc", "en": "Great, and don't hesitate to call me if anything needs repair later.", "zh": "太好了，之後如果有東西需要維修，隨時打給我。"}]}}, {"id": "complaint", "icon": "😤", "title": "客訴退換", "titleEn": "Complaints", "desc": "退貨、客訴、要求處理、要收據", "country": "US", "words": [{"en": "receipt", "zh": "收據", "ico": "🧾"}, {"en": "refund", "zh": "退款", "ico": "💵"}, {"en": "exchange", "zh": "換貨", "ico": "🔄"}, {"en": "broken", "zh": "壞掉的", "ico": "💔"}, {"en": "defective", "zh": "有瑕疵的", "ico": "⚠️"}, {"en": "manager", "zh": "經理", "ico": "🧑‍💼"}, {"en": "complaint", "zh": "客訴/抱怨", "ico": "😤"}, {"en": "warranty", "zh": "保固", "ico": "📄"}], "patterns": [{"en": "I'd like to return : 2, "survival": false, "homophone": "好 龍 我 則 瑞配兒 貼克"}, {"en": "I'm not satisfied with this product's quality.", "zh": "我對這產品的品質不滿意。", "tag": "抱怨", "level": 3, "survival": false}, {"en": "Could you file a complaint on my behalf?", "zh": "可以幫我登記客訴嗎？", "tag": "登記客訴", "level": 3, "survival": false}, {"en": "I'd appreciate it if you could resolve this as soon as possible.", "zh": "希望能盡快處理這個問題。", "tag": "催辦", "level": 3, "survival": false}, {"en": "Could I have a copy of this transaction for my records?", "zh": "可以給我一份交易紀錄留存嗎？", "tag": "留存紀錄", "level": 3, "survival": false}], "dialogue": {"title": "退貨客訴", "youRole": "顧客", "npcRole": "店員", "lines": [{"who": "you", "en": "Excuse me, I have a problem with this blender.", "zh": "不好意思，這台果汁機有問題。"}, {"who": "npc", "en": "I'm sorry to hear that. What seems to be the issue?", "zh": "很抱歉聽到這個消息。是什麼問題呢？"}, {"who": "you", "en": "It doesn't turn on at all. It's broken.", "zh": "它完全無法開機，壞掉了。"}, {"who": "npc", "en": "I see. Do you have your receipt with you?", "zh": "我了解了。您有帶收據嗎？"}, {"who": "you", "en": "Yes, here it is. I bought it three days ago.", "zh": "有，在這裡。我三天前買的。"}, {"who": "npc", "en": "Thank you. Would you like a refund or an exchange?", "zh": "謝謝您。請問您要退款還是換貨？"}, {"who": "you", "en": "Can I get a full refund, please?", "zh": "我可以要求全額退款嗎？"}, {"who": "npc", "en": "Sure, since it's still under warranty. Let me process that for you.", "zh": "沒問題，因為還在保固期內。我馬上幫您處理。"}, {"who": "you", "en": "Thank you. Also, could I get a copy of the refund receipt?", "zh": "謝謝。另外，可以給我一份退款收據嗎？"}, {"who": "npc", "en": "Of course, here you go. The refund will appear on your card in 3-5 business days.", "zh": "當然，這是給您的。退款會在3到5個工作天內入帳。"}, {"who": "you", "en": "Great, I appreciate your help.", "zh": "太好了，謝謝您的協助。"}, {"who": "npc", "en": "You're welcome. Sorry again for the inconvenience.", "zh": "不客氣。很抱歉造成您的不便。"}]}}];

let S;
function pKey(id){return 'life_en_'+id}
function loadProfile(id){
  S = JSON.parse(localStorage.getItem(pKey(id))||'null') || {};
  S.cards=S.cards||{}; S.favs=S.favs||[]; S.streakDates=S.streakDates||[]; S.dailyCount=S.dailyCount||{};
  S.goal=S.goal||20; S.rate=S.rate||1.0; S.showZh=S.showZh!==false; S.band=S.band||'all'; S.big=!!S.big; S.badges=S.badges||[];
}
function saveS(){localStorage.setItem(pKey(G.current),JSON.stringify(S))}

function cardKey(sid,i){return sid+'#'+i}
function getCard(sid,i){const k=cardKey(sid,i);return S.cards[k]||(S.cards[k]={lvl:0,due:0,seen:0})}
const SRS_DAYS=[0,1,2,4,8,16,30];
function grade(sid,i,ok){
  const c=getCard(sid,i);c.seen++;
  if(ok){c.lvl=Math.min(6,c.lvl+1);c.due=Date.now()+SRS_DAYS[c.lvl]*864e5;}
  else{c.lvl=Math.max(0,c.lvl-1);c.due=Date.now()+6e5;}
  countStudy();saveS();
}
function countStudy(){const t=todayStr();S.dailyCount[t]=(S.dailyCount[t]||0)+1;if(!S.streakDates.includes(t))S.streakDates.push(t);}
function freezeAvailable(){return !S.lastFreeze || (Date.now()-S.lastFreeze)>=7*864e5;}
function canRescueStreak(){return streakRaw()===0 && (S.streakDates||[]).length>0 && freezeAvailable();}
function useFreeze(){
  if(!freezeAvailable()){toast('補打卡每週只能用一次 🛡️');return;}
  S.frozenDates=S.frozenDates||[];
  const d=new Date();d.setDate(d.getDate()-1);const y=fmt(d);
  if(!S.streakDates.includes(y)&&!S.frozenDates.includes(y))S.frozenDates.push(y);
  S.lastFreeze=Date.now();saveS();renderHome();toast('🛡️ 已補回昨天，連續紀錄保住了！');
}
function streakRaw(){
  const set=new Set(S.streakDates);let n=0;const d=new Date();let key=todayStr();
  if(!set.has(key)){d.setDate(d.getDate()-1);key=fmt(d);if(!set.has(key))return 0;}
  while(set.has(key)){n++;d.setDate(d.getDate()-1);key=fmt(d);}
  return n;
}
function streak(){
  const set=new Set([...(S.streakDates||[]),...(S.frozenDates||[])]);let n=0;const d=new Date();let key=todayStr();
  if(!set.has(key)){d.setDate(d.getDate()-1);key=fmt(d);if(!set.has(key))return 0;}
  while(set.has(key)){n++;d.setDate(d.getDate()-1);key=fmt(d);}
  return n;
}
function totalStars(){let s=0;for(const k in S.cards)s+=S.cards[k].lvl;return s}
function dueCards(){
  const now=Date.now();const out=[];
  scenList().forEach(sc=>visPhrases(sc).forEach(o=>{const c=S.cards[cardKey(sc.id,o.i)];if(c&&c.seen>0&&c.due<=now)out.push({sc,p:o.p,i:o.i});}));
  return out;
}
function scenarioPct(sc){
  const vis=visPhrases(sc);if(!vis.length)return 0;
  let done=0;vis.forEach(o=>{const c=S.cards[cardKey(sc.id,o.i)];if(c&&c.lvl>=3)done++;});
  return Math.round(done/vis.length*100);
}

let voice=null;
function pickVoice(){const vs=speechSynthesis.getVoices();
  voice=vs.find(v=>/en[-_]US/i.test(v.lang)&&/female|samantha|zira|aria|jenny/i.test(v.name))||vs.find(v=>/en[-_]US/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||null;}
if('speechSynthesis'in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function say(text,rate){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=rate||S.rate||1;if(voice)u.voice=voice;
  speechSynthesis.speak(u);
}

const TRIP_CORE=['airport-checkin','immigration','restaurant','directions','money','sim-internet','emergency','safety'];
function tripDays(){if(!G.trip||!G.trip.date)return null;const d=new Date(G.trip.date+'T00:00:00');const now=new Date();now.setHours(0,0,0,0);return Math.round((d-now)/864e5);}
function tripScenarios(){
  if(!G.trip)return [];
  const set=new Set(TRIP_CORE);
  (G.trip.types||[]).forEach(k=>{const t=TRIP_TYPES.find(x=>x.k===k);if(t)t.sc.forEach(s=>set.add(s));});
  return SCENARIOS.filter(sc=>set.has(sc.id));
}

/* ===== 兒童遊戲層：聽聲點圖 + 貼紙 + 走失卡 ===== */
const STICKER_POOL=['🐶','🐱','🦄','🐼','🦁','🐸','🐙','🦖','🌈','⭐','🍦','🎈','🚀','🐧','🦉','🐢','🌸','🍩','🐳','🦋'];
let KG=null;
function allKidWords(){const a=[];SCENARIOS.forEach(sc=>(sc.words||[]).forEach(w=>{if(w.ico)a.push(w)}));return a;}
function scHasKidGame(sc){return (sc.words||[]).filter(w=>w.ico).length>=1;}
function startKidGame(){
  const pool=(curScenario.words||[]).filter(w=>w.ico);
  if(!pool.length){toast('這關暫無圖卡遊戲');return;}
  KG={sc:curScenario,items:shuffle(pool.slice()),idx:0,correct:0,rounds:Math.min(pool.length,8)};
  drawKidGame();
}
function drawKidGame(){
  if(KG.idx>=KG.rounds){finishKidGame();return;}
  const target=KG.items[KG.idx];
  const others=shuffle(allKidWords().filter(w=>w.ico!==target.ico&&w.en!==target.en)).slice(0,3);
  const opts=shuffle([target,...others]);
  const pct=Math.round(KG.idx/KG.rounds*100);
  const grid=opts.map(o=>`<button class="kgopt" onclick="kidPick(this,${o.en===target.en?1:0})"><div class="kgico">${o.ico}</div><div class="kgzh">${o.zh}</div></button>`).join('');
  const inner=`<div style="text-align:center;margin:8px 0 4px"><button class="mic" style="width:76px;height:76px;font-size:32px;margin:0 auto" onclick="say(${esc(target.en)})">🔊</button><div class="qsub" style="margin-top:10px;font-size:1rem">聽聲音，點出對的圖！</div></div><div class="kggrid">${grid}</div>`;
  $('#overlayMount').innerHTML=`<div class="overlay"><div class="ovhead"><button class="x" onclick="KG=null;closeOverlay()">✕</button><div class="ovprog"><i style="width:${pct}%"></i></div><div class="cnt">🎮 ${KG.idx+1}/${KG.rounds}</div></div><div class="ovbody">${inner}</div><div class="ovfoot"></div></div>`;
  setTimeout(()=>say(target.en),250);
}
function kidPick(el,correct){
  if(el.disabled||el.parentElement.dataset.done)return;
  if(correct){el.classList.add('kgok');el.parentElement.dataset.done=1;KG.correct++;confetti();heart(el);countStudy();saveS();
    setTimeout(()=>{KG.idx++;drawKidGame();},650);
  }else{el.classList.add('kgbad');el.disabled=true;el.style.opacity=.4;}
}
function awardSticker(){
  S.stickers=S.stickers||[];
  const st=STICKER_POOL[Math.floor(Math.random()*STICKER_POOL.length)];
  S.stickers.push(st);saveS();return st;
}
function finishKidGame(){
  const st=awardSticker();confetti();
  const inner=`<div class="flash"><div style="font-size:76px">${st}</div><div class="big-en">太棒了！</div>
    <div class="card3d" style="min-height:auto;gap:6px"><div style="font-size:.95rem;color:var(--sub)">你得到一張新貼紙 ${st}</div>
    <div style="font-size:.9rem;color:var(--sub)">貼紙簿現在有 <b style="color:var(--sky);font-size:1.3rem">${(S.stickers||[]).length}</b> 張！</div></div></div>`;
  $('#overlayMount').innerHTML=ovShell(inner,`<button class="pbtn ghost" onclick="openStickerBook()">看貼紙簿</button><button class="pbtn" onclick="startKidGame()">再玩一次</button>`);
  KG=null;awardBadges();
}

let Q=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function scenItems(sc,filter){let it=visPhrases(sc).map(o=>({sc,p:o.p,i:o.i}));if(filter)it=it.filter(filter);return shuffle(it);}
function buildQueue(mode,sc,filter){return{mode,items:scenItems(sc,filter),idx:0,correct:0,sid:sc.id};}

function startMode(mode){

  pool.sort((a,b)=>a.pr-b.pr||a.due-b.due);

}

function makeOptions(p,field){
  // 優先用「同一情境」的句子當誘答，比較像、比較難猜；不足再用全體補
  const same=shuffle((curScenario?curScenario.phrases:[]).filter(x=>x[field]&&x[field]!==p[field]));
  const wrong=same.slice(0,3);
  if(wrong.length<3){
    const all=[];SCENARIOS.forEach(sc=>sc.phrases.forEach(x=>all.push(x)));
    const extra=shuffle(all.filter(x=>x[field]&&x[field]!==p[field]&&!wrong.includes(x))).slice(0,3-wrong.length);
    wrong.push(...extra);
  }
  return shuffle([{text:p[field],correct:true},...wrong.map(w=>({text:w[field],correct:false}))]);
}
function pickOpt(el,correct){
  if(el.parentElement.dataset.done)return;el.parentElement.dataset.done=1;
  const cur=Q.items[Q.idx];const field=Q.mode==='listen'?'zh':'en';
  [...el.parentElement.children].forEach(b=>b.style.pointerEvents='none');
  if(correct){el.classList.add('ok');Q.correct++;grade(cur.sc.id,cur.i,true);say(cur.p.en);
    setTimeout(()=>{Q.idx++;renderCard()},750);
  }else{
    el.classList.add('no');grade(cur.sc.id,cur.i,false);
    const target=Q.mode==='dictation'?el.parentElement.querySelector('.opt'):null;
    [...el.parentElement.children].forEach(b=>{if(b.textContent===cur.p[field])b.classList.add('ok')});

}

function drawScramble(p){
  const inner=`<div class="qsub" style="margin-top:6px">把單字排成正確的英文句子</div>
    <div class="qword" style="font-size:1.15rem;color:var(--sub);margin:4px 0 14px">${p.zh}</div>

function normalize(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim()}
function scoreShadow(said){
  const cur=Q.items[Q.idx];const tw=normalize(cur.p.en).split(' '),hw=new Set(normalize(said).split(' '));
  let hit=0;tw.forEach(w=>{if(hw.has(w))hit++});const score=Math.round(hit/tw.length*100);
  // 逐字標記：綠＝機器聽到了、紅波浪＝沒聽到（可點聽慢速）
  const marked=cur.p.en.split(/(\s+)/).map(tok=>{const w=normalize(tok);if(!w)return tok;return hw.has(w)?`<span class="wok">${tok}</span>`:`<span class="wmiss">${tok}</span>`;}).join('');
  const missed=tw.filter(w=>!hw.has(w));
  $('#heard').innerHTML=`辨識到：<b>${said}</b>`;
  const cls=score>=80?'w-good':score>=50?'w-mid':'w-bad';
  const msg=score>=80?'這句大部分字都聽清楚了 🎉':'紅字是機器沒聽到的，點一下聽慢速、再唸一次：';
  const chips=(score<80&&missed.length)?missed.map(w=>`<button class="misschip" onclick="say('${w}')">🔊 ${w}</button>`).join(''):'';
  $('#scoreArea').innerHTML=`<div class="shadowline">${marked}</div>`+
    `<div class="scorebig ${cls}">${score}<span style="font-size:1.05rem"> % 字被聽到</span></div>`+
    `<div class="qsub">${msg}${chips}</div>`+
    `<div class="fbnote">※ 這是「單字有沒有被聽到」的比例，不是發音準不準的評分。想聽真人示範可點下方「範例」。</div>`;
  const ok=score>=60;grade(cur.sc.id,cur.i,ok);if(ok)Q.correct++;if(score>=80)heart($('#micBtn'));
  $('#ovfoot').innerHTML=`<button class="pbtn ghost" onclick="say(${esc(cur.p.en)})">🔊 範例</button><button class="pbtn" onclick="Q.idx++;renderCard()">下一題 ›</button>`;
}

const RS_STOP=new Set('a an the to of for and or i you we it is are am was were be been do does did can could would will shall may my your our me us at in on this that these those with please yes no ok oh so'.split(' '));
function rsRec(){
  if(!recSupported)return;const R=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rr=new R();rr.lang='en-US';rr.interimResults=false;
  $('#rsMic').classList.add('rec');$('#rsHeard').textContent='🔴 聽你說…';
  rr.onresult=e=>{
    const said=e.results[0][0].transcript;const pr=RS.pairs[RS.idx];
    const heard=new Set(normalize(said).split(' '));
    const key=[...new Set(normalize(pr.you.en).split(' '))].filter(w=>w&&!RS_STOP.has(w));
    const covered=key.filter(w=>heard.has(w)),missed=key.filter(w=>!heard.has(w));
    const pct=key.length?Math.round(covered.length/key.length*100):100;
    let fb=`辨識到：<b>${said}</b>`;
    if(key.length){
      if(pct>=60)fb+=`<br><span class="keyok">👍 重點都講到了（關鍵字 ${covered.length}/${key.length}）</span>`;
      else fb+=`<br>還差關鍵字：${missed.map(w=>`<span class="wmiss">${w}</span>`).join(' ')}<br><span class="qsub">參考說法：${pr.you.en}</span>`;
    }
    fb+=`<div class="fbnote">※ 只檢查你有沒有講到重點字，不評發音；旅遊講得通最重要，說法不用跟參考一模一樣。</div>`;
    $('#rsHeard').innerHTML=fb;
  };
  rr.onerror=()=>{$('#rsHeard').textContent='沒聽清楚，再試一次';};
  rr.onend=()=>{const m=$('#rsMic');if(m)m.classList.remove('rec');};
  try{rr.start();}catch(e){}
}

<script>/*ENGREVIEW*/(function(){if(window.EngReview)return;
var WK='engreview.wrong',VK='engreview.words',APP={"id": "errand-english", "name": "生活辦事英文"};
function load(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return{}}}
function save(k,o){try{localStorage.setItem(k,JSON.stringify(o))}catch(e){}}
function hash(s){var h=0,i;for(i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0}return(h>>>0).toString(36)}
function now(){return Date.now()}
var BOX=[0,1,3,7,16,40];
function addWrong(r){var w=load(WK);var id=hash((r.app||APP.id)+'|'+r.stem+'|'+(r.options||[]).join('~'));var e=w[id]||{id:id,first:now(),n:0};
 e.app=r.app||APP.id;e.appName=r.appName||APP.name;e.cat=r.cat||'其他';e.stem=r.stem;e.options=r.options;e.your=r.your;e.ans=r.ans;e.expl=r.expl||'';
 e.box=0;e.streak=0;e.due=now();e.n=(e.n||0)+1;e.ts=now();w[id]=e;save(WK,w);}
function graded(id,ok){var w=load(WK),e=w[id];if(!e)return;if(ok){e.streak=(e.streak||0)+1;e.box=Math.min((e.box||0)+1,BOX.length-1);if(e.streak>=2){delete w[id];save(WK,w);return;}e.due=now()+BOX[e.box]*86400000;}else{e.streak=0;e.box=0;e.due=now();}e.ts=now();w[id]=e;save(WK,w);}
function addWord(word,zh,pos,cat){var v=load(VK),k=String(word||'').toLowerCase().trim();if(!k)return false;
 if(!v[k]){v[k]={word:word,zh:zh||'（待查）',pos:pos||'',app:APP.id,appName:APP.name,cat:cat||'',box:0,streak:0,due:now(),ts:now()};save(VK,v);return true;}
 else{if((!v[k].zh||v[k].zh==='（待查）')&&zh){v[k].zh=zh;save(VK,v);}return false;}}
function setWordZh(word,zh){var v=load(VK),k=String(word).toLowerCase();if(v[k]){v[k].zh=zh;v[k].box=0;save(VK,v);}}
function wordGraded(word,ok){var v=load(VK),k=String(word).toLowerCase(),e=v[k];if(!e)return;if(ok){e.streak=(e.streak||0)+1;e.box=Math.min((e.box||0)+1,BOX.length-1);if(e.streak>=2){e.mastered=1;}e.due=now()+BOX[e.box]*86400000;}else{e.streak=0;e.box=0;e.mastered=0;e.due=now();}save(VK,v);}
function removeWord(word){var v=load(VK);delete v[String(word).toLowerCase()];save(VK,v);}
function cnt(o,due){var n=0,k;for(k in o){if(!due||o[k].due<=now())n++;}return n;}
window.EngReview={app:APP,addWrong:addWrong,graded:graded,addWord:addWord,setWordZh:setWordZh,wordGraded:wordGraded,removeWord:removeWord,
 wrong:function(){return load(WK)},words:function(){return load(VK)},
 wrongCount:function(d){return cnt(load(WK),d)},wordCount:function(d){return cnt(load(VK),d)}};
})();</script>
